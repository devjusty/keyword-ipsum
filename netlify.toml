[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "clipboard-read=(self), clipboard-write=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    
    # Content Security Policy - single line format required by Netlify
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.datamuse.com https://www.google-analytics.com https://www.googletagmanager.com; frame-src 'none'; media-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200